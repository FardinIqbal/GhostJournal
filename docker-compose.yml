version: '3.8'
services:
  db:
    image: postgres:13
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ghostjournal
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:6
    ports:
      - '6379:6379'

  backend:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/ghostjournal
      - REDIS_URL=redis://redis:6379/0
      - ALPACA_API_KEY=your_api_key
      - ALPACA_SECRET_KEY=your_secret
      - ALPACA_BASE_URL=https://paper-api.alpaca.markets
    depends_on:
      - db
      - redis
    ports:
      - '8000:8000'

  worker:
    build: .
    command: celery -A app.workers.celery_app worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/ghostjournal
      - REDIS_URL=redis://redis:6379/0
      - ALPACA_API_KEY=your_api_key
      - ALPACA_SECRET_KEY=your_secret
      - ALPACA_BASE_URL=https://paper-api.alpaca.markets
    depends_on:
      - db
      - redis

volumes:
  db_data:
